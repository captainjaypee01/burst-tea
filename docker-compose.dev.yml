services:
  mysql:
    ports:
      - "${MYSQL_PORT:-3307}:3306"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      # Container-to-container: MySQL listens on 3306. Host port 3307 is only MYSQL_PORT on the mysql service.
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-burst_tea}
      DB_USERNAME: ${MYSQL_USER:-burst}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - burst
    command: >
      sh -c "composer install --no-interaction &&
             php artisan config:clear &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8090"

  frontend:
    image: node:24-bookworm
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8090/api/v1}
    networks:
      - burst
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend
